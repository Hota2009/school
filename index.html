
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; direction: rtl; }
  .chat-wrap { max-width: 480px; margin: 1rem auto; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
  .chat-header { background: #0E3D6E; color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .header-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #f5a623; background: #1a5fa0; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .header-info .name { font-size: 15px; font-weight: 700; }
  .header-info .status { font-size: 12px; opacity: 0.8; }
  .chat-body { padding: 16px; min-height: 260px; max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f4f6f9; }
  .msg { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.7; max-width: 90%; }
  .bot-msg { background: #fff; border: 0.5px solid #dde2ea; border-radius: 14px 14px 14px 2px; align-self: flex-start; color: #1a2a3a; }
  .user-msg { background: #0E3D6E; color: #fff; border-radius: 14px 14px 2px 14px; align-self: flex-end; }
  .chat-footer { padding: 12px 14px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
  .footer-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .btns-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .q-btn { background: #fff; border: 1px solid #c5d0df; color: #0E3D6E; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-family: 'Cairo', sans-serif; cursor: pointer; transition: background 0.18s, border-color 0.18s; font-weight: 500; }
  .q-btn:hover { background: #e8f0fb; border-color: #0E3D6E; }
  .q-btn:active { background: #0E3D6E; color: #fff; }
  .cat-btn { background: #f5a623; border: none; color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 700; margin-left: 6px; }
  .cat-btn.active, .cat-btn:hover { background: #0E3D6E; }
  .cats-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .reset-btn { margin-top: 10px; background: transparent; border: none; color: #f5a623; font-size: 13px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 500; padding: 0; }
  .reset-btn:hover { text-decoration: underline; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
  .typing span { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
</style>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="header-avatar">🏫</div>
    <div class="header-info">
      <div class="name">مدرسة الخارجة الثانوية بنين</div>
      <div class="status">المساعد الذكي — متصل الآن</div>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="msg bot-msg">أهلاً بك! 👋 أنا المساعد الذكي لمدرسة الخارجة الثانوية بنين.<br>اختر تصنيفاً ثم اضغط على سؤالك وسأجيبك فوراً.</div>
  </div>

  <div class="chat-footer">
    <div class="cats-row" id="catsRow"></div>
    <div class="footer-label" id="footerLabel">اختر سؤالاً:</div>
    <div class="btns-grid" id="btnsGrid"></div>
    <button class="reset-btn" onclick="resetChat()">↺ ابدأ من جديد</button>
  </div>
</div>

<script>
const allData = {
  "عام": [
    { q: "ما موقع المدرسة؟", a: "تقع مدرسة الخارجة الثانوية بنين في مدينة الخارجة، محافظة الوادي الجديد، جمهورية مصر العربية." },
    { q: "ما رؤية المدرسة؟", a: "تسعى المدرسة إلى اكتشاف المواهب ورعايتها وتنميتها في جميع المجالات الأكاديمية والرياضية والفنية والعلمية، وبناء جيل متميز قادر على العطاء." },
    { q: "كيف التواصل مع الإدارة؟", a: "يمكن التواصل مع إدارة المدرسة عبر الحضور الشخصي خلال أوقات الدراسة، أو التواصل مع الإدارة مباشرةً للاستفسار عن أي شأن يخص الطلاب أو أولياء الأمور." },
    { q: "هل المدرسة حكومية؟", a: "نعم، مدرسة الخارجة الثانوية بنين مدرسة حكومية تابعة لوزارة التربية والتعليم المصرية، وتقع تحت إشراف مديرية الوادي الجديد." },
    { q: "كم عدد الطلاب تقريباً؟", a: "تستقبل المدرسة عدداً كبيراً من طلاب المرحلة الثانوية من أبناء مدينة الخارجة والمناطق المجاورة في محافظة الوادي الجديد." },
  ],
  "دراسي": [
    { q: "ما المراحل الدراسية؟", a: "المدرسة تضم المرحلة الثانوية العامة (الصف الأول والثاني والثالث الثانوي) للطلاب." },
    { q: "ما مواعيد الدراسة؟", a: "تبدأ الدراسة من الأحد إلى الخميس، من الساعة الثامنة صباحاً حتى الثانية ظهراً تقريباً." },
    { q: "ما الشهادات المعتمدة؟", a: "تمنح المدرسة شهادة الثانوية العامة المصرية المعتمدة من وزارة التربية والتعليم، والتي تؤهّل الطلاب للالتحاق بالجامعات المصرية والمعاهد العليا." },
    { q: "ما المواد الدراسية؟", a: "تشمل المواد: اللغة العربية، الرياضيات، الفيزياء، الكيمياء، الأحياء، اللغة الإنجليزية، التاريخ، الجغرافيا، وغيرها وفق مناهج الوزارة." },
    { q: "كيف يتم التقييم؟", a: "يتم التقييم عبر امتحانات الفصل الدراسي الأول والثاني، إضافةً إلى الامتحانات النهائية للثانوية العامة التي تشرف عليها وزارة التربية والتعليم." },
    { q: "هل توجد فصول تقوية؟", a: "تحرص المدرسة على دعم الطلاب الذين يحتاجون مساعدة إضافية من خلال التنسيق مع المعلمين وأولياء الأمور لضمان تحقيق أفضل النتائج." },
  ],
  "أنشطة": [
    { q: "ما الأنشطة المتاحة؟", a: "تتوفر أنشطة رياضية (كرة القدم وغيرها)، فنية (رسم وأشغال يدوية)، علمية، واجتماعية، وتُشجّع المدرسة جميع المواهب." },
    { q: "هل توجد رحلات مدرسية؟", a: "نعم، تنظّم المدرسة رحلات ترفيهية وتعليمية للطلاب طوال العام الدراسي بهدف تنمية روح الانتماء والتعاون." },
    { q: "هل يوجد نشاط رياضي منتظم؟", a: "نعم، تُقام المباريات الرياضية الداخلية والخارجية بين الطلاب، وتشارك المدرسة في البطولات الرياضية على مستوى المحافظة." },
    { q: "هل توجد مسابقات؟", a: "تشارك المدرسة في المسابقات العلمية والأدبية والفنية على مستوى المحافظة والجمهورية، وتحرص على تكريم المتميزين من طلابها." },
    { q: "هل يوجد نادٍ علمي؟", a: "تهتم المدرسة بالجانب العلمي وتشجع الطلاب على المشاركة في أنشطة ومعارض العلوم لتنمية التفكير الإبداعي والاستكشافي." },
  ],
  "التسجيل": [
    { q: "كيف أسجل في المدرسة؟", a: "يتم التسجيل عن طريق التوجه لإدارة المدرسة في بداية العام الدراسي مع إحضار المستندات المطلوبة مثل شهادة إتمام المرحلة الإعدادية وصور شخصية وبطاقة الرقم القومي." },
    { q: "ما شروط القبول؟", a: "يُشترط أن يكون الطالب حاصلاً على شهادة إتمام مرحلة التعليم الإعدادي، وأن يكون من أبناء المحافظة أو المنطقة التعليمية التابعة للمدرسة." },
    { q: "ما المستندات المطلوبة؟", a: "المستندات المطلوبة عادةً: شهادة التعليم الإعدادي الأصل، صورة بطاقة الرقم القومي للطالب ولولي الأمر، صور شخصية حديثة، وشهادة الميلاد." },
    { q: "متى يبدأ التسجيل؟", a: "يبدأ التسجيل عادةً في نهاية شهر يونيو وبداية شهر يوليو من كل عام، قبيل انطلاق العام الدراسي الجديد في سبتمبر." },
  ],
};

const cats = Object.keys(allData);
let activeCat = cats[0];
let askedQs = new Set();

const chatBody = document.getElementById('chatBody');
const btnsGrid = document.getElementById('btnsGrid');
const catsRow = document.getElementById('catsRow');
const footerLabel = document.getElementById('footerLabel');

function renderCats() {
  catsRow.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; renderCats(); renderButtons(); };
    catsRow.appendChild(btn);
  });
}

function renderButtons() {
  btnsGrid.innerHTML = '';
  const items = allData[activeCat].filter(x => !askedQs.has(x.q));
  if (items.length === 0) {
    btnsGrid.innerHTML = '<span style="font-size:13px;color:var(--color-text-secondary);">تم الإجابة على جميع أسئلة هذا التصنيف.</span>';
    return;
  }
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.textContent = item.q;
    btn.onclick = () => handleQ(item);
    btnsGrid.appendChild(btn);
  });
}

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + (type === 'bot' ? 'bot-msg' : 'user-msg');
  div.innerHTML = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'msg bot-msg typing';
  t.id = 'typingIndicator';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatBody.appendChild(t);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function handleQ(item) {
  addMsg(item.q, 'user');
  askedQs.add(item.q);
  btnsGrid.innerHTML = '';
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(item.a, 'bot');
    footerLabel.textContent = 'هل لديك سؤال آخر؟';
    renderButtons();
  }, 900);
}

function resetChat() {
  chatBody.innerHTML = '<div class="msg bot-msg">أهلاً بك! 👋 أنا المساعد الذكي لمدرسة الخارجة الثانوية بنين.<br>اختر تصنيفاً ثم اضغط على سؤالك وسأجيبك فوراً.</div>';
  footerLabel.textContent = 'اختر سؤالاً:';
  askedQs.clear();
  activeCat = cats[0];
  renderCats();
  renderButtons();
}

renderCats();
renderButtons();
</script>
